name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck backend
        run: npm run typecheck --workspace=apps/backend

      - name: Typecheck frontend
        run: npm run typecheck --workspace=apps/frontend

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint backend
        run: npm run lint --workspace=apps/backend

      - name: Lint frontend
        run: npm run lint --workspace=apps/frontend

  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: meditrack_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d meditrack_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run migrations on test DB
        run: npm run db:migrate --workspace=apps/backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/meditrack_test

      - name: Run tests
        run: npm run test --workspace=apps/backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/meditrack_test
          JWT_SECRET: test-secret-min-32-chars-for-testing-only
          JWT_REFRESH_SECRET: test-refresh-secret-min-32-chars-testing

  build:
    name: Build check
    runs-on: ubuntu-latest
    needs: [typecheck, lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build --workspace=apps/frontend
        env:
          NEXT_PUBLIC_API_URL: https://api.meditrack.app

      - name: Verify backend Docker image builds
        run: docker build -f apps/backend/Dockerfile -t meditrack-backend:ci .
