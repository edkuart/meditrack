version: '3.9'

# Local development stack.
# Provides backing services only — run backend/frontend with `npm run dev` from the repo root.
# Usage:
#   docker compose up -d          → start Postgres (and optional MinIO)
#   docker compose down           → stop containers
#   docker compose down -v        → stop + delete volumes (full reset)

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: meditrack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d meditrack']
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional: S3-compatible local storage (uncomment to use MinIO instead of real AWS S3)
  # minio:
  #   image: minio/minio:latest
  #   restart: unless-stopped
  #   command: server /data --console-address ":9001"
  #   environment:
  #     MINIO_ROOT_USER: minioadmin
  #     MINIO_ROOT_PASSWORD: minioadmin
  #   ports:
  #     - '9000:9000'   # S3 API
  #     - '9001:9001'   # Web console
  #   volumes:
  #     - minio_data:/data
  #   healthcheck:
  #     test: ['CMD', 'mc', 'ready', 'local']
  #     interval: 5s
  #     timeout: 5s
  #     retries: 10

volumes:
  postgres_data:
  # minio_data:
